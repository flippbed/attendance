<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <title>MMSCE Smart Attendance Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; text-align: center; }

        #welcomeScreen, #successScreen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #1a2a6c; color: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 2000; padding: 20px;
        }
        
        .enter-btn { background: #f1c40f; color: #1a2a6c; border: none; padding: 18px 45px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-top: 20px; }
        .view-btn { background: #ffffff; color: #1a2a6c; border: none; padding: 12px 30px; font-size: 1rem; font-weight: bold; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 20px; }

        .header { background: white; padding: 15px; border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; position: sticky; top: 0; z-index: 1000; }
        .quote-text { font-style: italic; font-size: 1.1rem; margin: 25px 0; color: #f1c40f; max-width: 95%; line-height: 1.5; }
        
        #locationStatus { font-weight: bold; margin: 10px auto; padding: 12px; border-radius: 8px; max-width: 90%; font-size: 0.85rem; }
        .on-campus { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .off-campus { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .waiting { background: #fff3cd; color: #856404; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; border: 1px solid #eee; }
        .name-text { flex-grow: 1; text-align: left; font-weight: bold; font-size: 0.95rem; color: #2c3e50; }
        .btn-p { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="welcomeScreen">
    <h1>Welcome to MMSCE</h1>
    <h2 style="font-size: 1.2rem; opacity: 0.9;">B.Ed Semester-2, 2026</h2>
    <p id="timeWarning" style="color: #f1c40f; font-weight: bold; margin-top: 15px;"></p>
    <button id="mainEnterBtn" class="enter-btn" onclick="startSystem()">Mark Your Attendance</button>
</div>

<div id="successScreen" style="display:none;">
    <div style="font-size: 60px;">✅</div>
    <h1>Attendance Recorded!</h1>
    <div id="quoteDisplay" class="quote-text"></div>
    <a href="https://docs.google.com/spreadsheets/d/1znoFpVPLCPlpBjCs96-WHHVt9HLkEaI4864uIK56xrU/edit?usp=drivesdk" target="_blank" class="view-btn">📊 View Attendance Sheet</a>
</div>

<div id="mainContent" style="display:none;">
    <div class="header">
        <h2 style="font-size: 1.1rem; color:#1a2a6c;">Smt. M. M. Shah College of Education</h2>
        <div id="locationStatus" class="waiting">🔄 Verifying Location...</div>
    </div>
    <div id="attendanceGrid" class="grid"></div>
</div>

<script>
    // 1. UPDATE YOUR WEB APP URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4qjqBG_KP90STQIMmJiOkZnfyt_XZRPqou4b94Bt91wTygeAw8X5ich5cDlomUMDV/exec";
    const COLLEGE_LAT = 22.720343216762977; 
    const COLLEGE_LON = 71.65218912589522;
    const MAX_DISTANCE = 0.35; // 350 meters

    const students = ["1 BAMBHANIYA VARUN", "2 BARAIYA RAMDEV", "3 BAVLIYA JAYDEEPBHAI", "4 BHADANIYA RITAXI", "5 BHUVA YAISHA", "6 CHATUR SNEHA", "7 CHAUHAN KRISHNA", "8 CHAUHAN SMITKUMAR", "9 CHAVDA YASH", "10 DALOLIYA SHILPABEN", "11 DAXINI HETVI", "12 Dumadiya Sanjay", "13 GADHVI HINAL", "15 Gami Rahul", "16 GOSAI POOJA", "17 JAMBUKIYA ASMITABEN", "18 Janadiya Dhiraj", "19 KHAKHI MITALBEN", "20 LIMBADIYA KOMALBEN", "21 MAHERIYA VARSHABEN", "22 MAHERIYA YOGESHKUMAR", "23 MAKWANA DOLLY", "24 MALAKIYA SWITYBEN", "25 MANANI ALKABEN", "26 MANSURI ARMAN", "27 Mehta Vishvaben", "28 MITHAPARA VANRAJBHAI", "29 MORI MANSHI", "30 NAKIYA GEETABEN", "31 NAKIYA NIKITABEN", "32 NAKIYA SIDDHIBEN", "33 PALANI JAHANVIBEN", "34 Parmar Aman", "35 PARMAR ARTI", "36 PARMAR RESHMA", "37 RANA MADHAVSINH", "38 RATHOD KISMATBEN", "39 RATHOD NARENDRABHAI", "40 JADAV PRIYABEN", "41 Rojasara Kinjal", "42 SARVAIYA JAYESH", "43 SATANI AASHISHKUMAR", "44 SOLANKI HITIXA", "45 SOLANKI JAYSHRIBEN", "46 SOLANKI VAIBHAV", "47 Sumra Farhin", "48 THIM ZEEYA", "49 CHAUHAN TEJASHREEBEN", "50 TRIVEDI NISHTHA", "51 VAGHELA DEVANSHIBA", "52 Vakhariya Dhara", "53 ZALA KOMALBA"];

    const todayKey = "mmsce_lock_" + new Date().toLocaleDateString();
    const chime = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
    let canMark = false;

    const quotes = ["Education is the most powerful weapon which you can use to change the world.", "શિક્ષણ એ જીવનની તૈયારી નથી; શિક્ષણ એ પતે જ જીવન છે.", "शिक्षा सबसे शक्तिशाली हथियार है जिससे आप दुनिया बदल सकते हैं।", "ज्ञान ही शक्ति है।"];

    function isTimeValid() {
        const now = new Date();
        const currentTime = now.getHours() + now.getMinutes() / 60;
        return currentTime >= 11.25 && currentTime <= 18.0; 
    }

    window.onload = function() {
        if (localStorage.getItem(todayKey) === "locked") {
            displayQuote();
            showSuccess();
            return;
        }
        if (!isTimeValid()) {
            document.getElementById('mainEnterBtn').style.display = 'none';
            document.getElementById('timeWarning').innerText = "Portal Closed.";
        }
    };

    function startSystem() {
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        initGPS();
        renderGrid();
    }

    function showSuccess() {
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('successScreen').style.display = 'flex';
    }

    function displayQuote() {
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('quoteDisplay').innerText = "“ " + randomQuote + " ”";
    }

    function initGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(updateLocation, handleGPSError, {enableHighAccuracy: true});
        }
    }

    function handleGPSError() {
        document.getElementById('locationStatus').innerText = "❌ GPS Error: Enable Location & Refresh";
        document.getElementById('locationStatus').className = "off-campus";
    }

    function updateLocation(pos) {
        const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, COLLEGE_LAT, COLLEGE_LON);
        const statusDiv = document.getElementById('locationStatus');
        if (dist <= MAX_DISTANCE) {
            statusDiv.innerText = "📍 ON CAMPUS - READY";
            statusDiv.className = "on-campus";
            canMark = true;
        } else {
            statusDiv.innerText = "❌ OUTSIDE COLLEGE (" + (dist * 1000).toFixed(0) + "m)";
            statusDiv.className = "off-campus";
            canMark = false;
        }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2-lat1) * Math.PI / 180;
        const dLon = (lon2-lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function renderGrid() {
        const grid = document.getElementById('attendanceGrid');
        grid.innerHTML = "";
        students.forEach((name) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="name-text">${name}</div><button class="btn-p" onclick="mark('${name}', this)">P</button>`;
            grid.appendChild(card);
        });
    }

    async function mark(name, btn) {
        if (!canMark) return alert("GPS Error: You must be on campus.");
        
        btn.innerText = "⌛..."; 
        btn.disabled = true;

        let success = false;
        for (let i = 0; i < 3; i++) { // Retry 3 times
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ name: name, status: 'P' }) 
                });
                success = true;
                break; 
            } catch (err) {
                console.log("Retry " + (i+1));
            }
        }

        if (success) {
            localStorage.setItem(todayKey, "locked");
            chime.play();
            displayQuote();
            showSuccess();
        } else {
            alert("Connection Failed. Check your data and try again.");
            btn.innerText = "P";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
